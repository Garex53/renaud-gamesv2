<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renaud Games — Mots croisés</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="stars"></div><div class="stars2"></div><div class="stars3"></div>
  <div class="container">
    <section class="hero glass">
      <div class="brand"><div class="logo"><img src="img/logo.png" alt="Renaud Games"></div><div><div class="small">Mini arcade</div><h1>Mots croisés</h1></div></div>
      <p class="subtitle"></p>
      <div class="page-links"><a class="btn" href="index.html">🏠 Accueil</a><a class="btn secondary" href="snake.html">Snake</a><a class="btn secondary" href="zombie.html">Zombie</a><a class="btn secondary" href="memory.html">Memory</a></div>
      <div class="stats"><div class="stat"><strong id="statCross">0</strong><span>Mots croisés réussis</span></div><div class="stat"><strong id="statSnake">0</strong><span>Meilleur Snake</span></div><div class="stat"><strong id="statZombie">0</strong><span>Meilleur Zombie</span></div><div class="stat"><strong id="statTotal">0</strong><span>Total points</span></div></div>
    </section>

    <section class="glass screen-inner" style="margin-top:20px;">
      <div class="section-head"><div><h2>🧠 Mots croisés</h2><p class="note">Choisis la catégorie, la difficulté et la taille de la grille.</p></div></div>
      <div class="filters">
        <label class="tag">Catégorie <select id="cwCategory"><option value="informatique">Informatique</option><option value="culture">Culture G</option><option value="cinema">Cinéma</option></select></label>
        <label class="tag">Difficulté <select id="cwDifficulty"><option value="facile">Facile</option><option value="moyen">Moyen</option><option value="difficile">Difficile</option></select></label>
        <label class="tag">Taille <select id="cwSize"><option value="8">8 x 8</option><option value="10" selected>10 x 10</option><option value="12">12 x 12</option></select></label>
        <button class="btn" onclick="generateCrossword()">🎲 Nouvelle grille</button>
      </div>
      <div class="cw-layout" style="margin-top:16px;">
        <div>
          <div class="panel">
            <div class="row" style="justify-content:space-between;margin-bottom:12px;"><div class="tag">Progression <span id="cwProgressLabel">0%</span></div><div class="tag">Score grille <span id="cwGridScore">0</span></div></div>
            <div class="bar"><span id="cwProgressBar" style="width:0%"></span></div>
            <div id="cwGrid" class="cw-grid" style="margin-top:14px;"></div>
            <div class="game-actions" style="margin-top:14px;"><button class="btn secondary" onclick="checkCrossword()">✅ Vérifier</button><button class="btn secondary" onclick="giveLetterHint()">💡 Indice lettre</button><button class="btn secondary" onclick="revealWord()">🔎 Révéler un mot</button><button class="btn secondary" onclick="clearWrongCells()">🧹 Nettoyer erreurs</button></div>
            <div id="cwFeedback" class="feedback" style="margin-top:10px;"></div>
          </div>
        </div>
        <div class="panel"><div class="clues" id="cwClues"></div></div>
      </div>
    </section>
    <footer>Renaud Games — Mots croisés</footer>
  </div>
  <script src="js/app.js"></script>
  <script src="js/crossword.js"></script>
</body>
</html>
