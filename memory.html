<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renaud Games — Memory</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="stars"></div><div class="stars2"></div><div class="stars3"></div>
  <div class="container">
    <section class="hero glass">
      <div class="brand"><div class="logo"><img src="img/logo.png" alt="Renaud Games"></div><div><div class="small">Mini arcade</div><h1>Memory</h1></div></div>
      <p class="subtitle"></p>
      <div class="page-links"><a class="btn" href="index.html">🏠 Accueil</a><a class="btn secondary" href="crossword.html">Mots croisés</a><a class="btn secondary" href="snake.html">Snake</a><a class="btn secondary" href="zombie.html">Zombie</a></div>
      <div class="stats"><div class="stat"><strong id="statCross">0</strong><span>Mots croisés réussis</span></div><div class="stat"><strong id="statSnake">0</strong><span>Meilleur Snake</span></div><div class="stat"><strong id="statZombie">0</strong><span>Meilleur Zombie</span></div><div class="stat"><strong id="statTotal">0</strong><span>Total points</span></div></div>
    </section>
    <section class="glass screen-inner" style="margin-top:20px;">
      <div class="section-head"><div><h2>🃏 Memory</h2><p class="note">Un petit bonus simple et plaisant.</p></div></div>
      <div class="grid2"><div class="panel"><div id="memoryGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;"></div></div><div class="panel"><div class="list"><div class="item"><strong>Coups :</strong> <span id="memoryMoves">0</span></div><div class="item"><strong>Paires :</strong> <span id="memoryPairs">0</span> / 8</div></div><div class="game-actions" style="margin-top:14px;"><button class="btn" onclick="initMemory()">🔄 Rejouer</button></div></div></div>
    </section>
    <footer>Renaud Games — Memory</footer>
  </div>
  <script src="js/app.js"></script>
  <script src="js/memory.js"></script>
</body>
</html>
