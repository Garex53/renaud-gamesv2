<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renaud Games — Snake</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="stars"></div><div class="stars2"></div><div class="stars3"></div>
  <div class="container">
    <section class="hero glass">
      <div class="brand"><div class="logo"><img src="img/logo.png" alt="Renaud Games"></div><div><div class="small">Mini arcade</div><h1>Snake</h1></div></div>
      <p class="subtitle"></p>
      <div class="page-links"><a class="btn" href="index.html">🏠 Accueil</a><a class="btn secondary" href="crossword.html">Mots croisés</a><a class="btn secondary" href="zombie.html">Zombie</a><a class="btn secondary" href="memory.html">Memory</a></div>
      <div class="stats"><div class="stat"><strong id="statCross">0</strong><span>Mots croisés réussis</span></div><div class="stat"><strong id="statSnake">0</strong><span>Meilleur Snake</span></div><div class="stat"><strong id="statZombie">0</strong><span>Meilleur Zombie</span></div><div class="stat"><strong id="statTotal">0</strong><span>Total points</span></div></div>
    </section>
    <section class="glass screen-inner" style="margin-top:20px;">
      <div class="section-head"><div><h2>🐍 Snake</h2><p class="note">Le serpent traverse les murs comme dans le vrai. Plus tu manges, plus ça accélère.</p></div></div>
      <div class="snake-wrap"><div class="center"><canvas id="snakeCanvas" class="game-canvas" width="420" height="420"></canvas><div class="controls"><div></div><button class="control-btn" onclick="setSnakeDir('up')">⬆️</button><div></div><button class="control-btn" onclick="setSnakeDir('left')">⬅️</button><button class="control-btn" onclick="toggleSnakePause()">⏯️</button><button class="control-btn" onclick="setSnakeDir('right')">➡️</button><div></div><button class="control-btn" onclick="setSnakeDir('down')">⬇️</button><div></div></div></div><div class="panel"><div class="list"><div class="item"><strong>Score :</strong> <span id="snakeScore">0</span></div><div class="item"><strong>Record :</strong> <span id="snakeBest">0</span></div><div class="item"><strong>Vitesse :</strong> <span id="snakeSpeedLabel">1</span></div></div><div class="game-actions" style="margin-top:14px;"><button class="btn" onclick="resetSnake()">🔄 Rejouer</button></div></div></div>
    </section>
    <footer>Renaud Games — Snake</footer>
  </div>
  <script src="js/app.js"></script>
  <script src="js/snake.js"></script>
</body>
</html>
